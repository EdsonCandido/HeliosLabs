name: CI - React Vite

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      #- name: Rodar lint
      #  run: npm run lint

      - name: Build do projeto
        run: npm run build

      - name: Upload do build (artefato)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist